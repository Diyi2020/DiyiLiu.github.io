<script>
  (function() {
    var storedTheme = null;
    try {
      storedTheme = localStorage.getItem("theme");
    } catch (e) {}
    if (storedTheme === "dark") {
      document.documentElement.classList.add("dark-mode");
    }
  })();
</script>

  html.dark-mode .page__footer {

  }

  html.dark-mode .masthead,

  html.dark-mode .page__meta + .pagination,
  html.dark-mode .comment__date + .pagination,
  html.dark-mode .page__related,
  html.dark-mode .archive__subtitle,
  html.dark-mode .comment:not(:last-child),

    border-color: #334155;
  }

  }

  }

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var root = document.documentElement;
    var toggle = document.getElementById("theme-toggle");
    if (!toggle) return;

    function syncLabel() {
      toggle.textContent = root.classList.contains("dark-mode") ? "Light" : "Dark";
      toggle.setAttribute("aria-pressed", root.classList.contains("dark-mode") ? "true" : "false");
    }

    toggle.addEventListener("click", function() {
      root.classList.toggle("dark-mode");
      try {
        localStorage.setItem("theme", root.classList.contains("dark-mode") ? "dark" : "light");
      } catch (e) {}
      syncLabel();
    });

    syncLabel();
  });
</script>
